name: Scan

on:
  push:
    branches:
      - main

jobs:
  Scan:
    runs-on: ubuntu-latest

    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v2
        with:
          distribution: 'adopt'
          java-version: '17'

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Maven project
        run: mvn clean install

      - name: Generate code coverage report
        run: mvn jacoco:report

  container-scan:
    runs-on: ubuntu-latest
    env:
      TRIVY_SEVERITY: "CRITICAL,HIGH"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t app:${{ github.sha }} .

      - name: Trivy Scan - SARIF Output
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: app:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          exit-code: "0"
          vuln-type: "os,library"
          ignore-unfixed: true
          severity: ${{ env.TRIVY_SEVERITY }}

      - name: Upload SARIF Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: container-scan-sarif
          path: trivy-results.sarif

      - name: Trivy Scan - Threshold Check
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: app:${{ github.sha }}
          format: table
          exit-code: "1"
          vuln-type: "os,library"
          ignore-unfixed: true
          severity: ${{ env.TRIVY_SEVERITY }}

  sast-scan:
    runs-on: ubuntu-latest
    env:
      SEMGREP_SEVERITY: "ERROR"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep Scan 
        run: |
          semgrep scan --config p/default --sarif --output=semgrep-results.sarif

      - name: Upload SARIF Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sast-scan-sarif
          path: semgrep-results.sarif

      - name: Evaluate Threshold
        run: |
          semgrep scan --config p/default --error --severity $SEMGREP_SEVERITY
